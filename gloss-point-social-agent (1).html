<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloss Point — Agent Social Media</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --tiffany: #81d8d0;
  --tiffany-dim: rgba(129,216,208,0.15);
  --tiffany-border: rgba(129,216,208,0.3);
  --dark: #0a0a0a;
  --card: #111;
  --card2: #161616;
  --muted: #888;
  --white: #f0f0f0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--dark);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG */
body::before {
  content:'';
  position:fixed;
  top:-200px; left:-200px;
  width:600px; height:600px;
  background: radial-gradient(circle, rgba(129,216,208,0.06) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 40px 20px 80px;
  position: relative;
  z-index:1;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 48px;
}
.header .logo-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 8px;
}
.header .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--tiffany);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{ opacity:1; transform:scale(1); }
  50%{ opacity:0.5; transform:scale(0.8); }
}
.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  letter-spacing: 3px;
  color: var(--white);
  line-height: 1;
}
.header h1 span { color: var(--tiffany); }
.header p {
  color: var(--muted);
  font-size: 0.95rem;
  margin-top: 8px;
}

/* PLATFORM SELECTOR */
.platform-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.platform-btn {
  flex: 1;
  min-width: 120px;
  padding: 12px 16px;
  background: var(--card);
  border: 2px solid var(--tiffany-border);
  border-radius: 10px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.platform-btn:hover { border-color: var(--tiffany); color: var(--white); }
.platform-btn.active {
  background: var(--tiffany-dim);
  border-color: var(--tiffany);
  color: var(--tiffany);
}

/* TONE SELECTOR */
.label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  display: block;
}

.tone-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.tone-btn {
  padding: 8px 14px;
  background: var(--card);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
}
.tone-btn:hover { border-color: var(--tiffany-border); color: var(--white); }
.tone-btn.active {
  background: var(--tiffany-dim);
  border-color: var(--tiffany);
  color: var(--tiffany);
}

/* QUICK TOPICS */
.topics-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.topic-chip {
  padding: 7px 13px;
  background: var(--card2);
  border: 1.5px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  color: var(--muted);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
}
.topic-chip:hover {
  border-color: var(--tiffany-border);
  color: var(--white);
  background: var(--tiffany-dim);
}

/* INPUT */
.input-wrap {
  position: relative;
  margin-bottom: 16px;
}
textarea {
  width: 100%;
  min-height: 110px;
  padding: 16px;
  background: var(--card);
  border: 2px solid var(--tiffany-border);
  border-radius: 12px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  resize: vertical;
  transition: border-color 0.2s;
  outline: none;
}
textarea:focus { border-color: var(--tiffany); }
textarea::placeholder { color: var(--muted); }

/* GENERATE BTN */
.generate-btn {
  width: 100%;
  padding: 16px;
  background: var(--tiffany);
  color: #0a0a0a;
  border: none;
  border-radius: 12px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.generate-btn:hover { background: #a3e9e5; transform: translateY(-1px); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* SPINNER */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #0a0a0a;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* RESULT */
.result-card {
  margin-top: 28px;
  background: var(--card);
  border: 2px solid var(--tiffany-border);
  border-radius: 16px;
  overflow: hidden;
  display: none;
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}

.result-header {
  padding: 14px 20px;
  background: var(--tiffany-dim);
  border-bottom: 1px solid var(--tiffany-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.result-header span {
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--tiffany);
}
.result-actions { display: flex; gap: 8px; }
.action-btn {
  padding: 6px 14px;
  background: rgba(129,216,208,0.1);
  border: 1px solid var(--tiffany-border);
  border-radius: 6px;
  color: var(--tiffany);
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.action-btn:hover { background: var(--tiffany); color: #0a0a0a; }

.result-body {
  padding: 24px 20px;
}

/* POST PREVIEW */
.post-preview {
  background: var(--card2);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  white-space: pre-wrap;
  font-size: 0.97rem;
  line-height: 1.7;
  color: var(--white);
  border-left: 3px solid var(--tiffany);
}

/* HASHTAGS */
.hashtags-block {
  background: rgba(129,216,208,0.05);
  border: 1px solid var(--tiffany-border);
  border-radius: 10px;
  padding: 14px 16px;
}
.hashtags-label {
  font-size: 0.72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.hashtags-text {
  font-size: 0.88rem;
  color: var(--tiffany);
  line-height: 1.8;
}

/* HISTORY */
.history-section {
  margin-top: 40px;
  display: none;
}
.history-section h3 {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px;
  color: var(--muted);
  font-size: 1.1rem;
  margin-bottom: 14px;
}
.history-item {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.history-item:hover { border-color: var(--tiffany-border); background: var(--card2); }
.history-platform {
  font-size: 1.2rem;
  flex-shrink: 0;
}
.history-content { flex: 1; overflow: hidden; }
.history-topic {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--tiffany);
  margin-bottom: 2px;
}
.history-preview {
  font-size: 0.82rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-time {
  font-size: 0.72rem;
  color: rgba(136,136,136,0.5);
  flex-shrink: 0;
}

/* DIVIDER */
.divider {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 32px 0;
}

/* ERROR */
.error-msg {
  background: rgba(255,100,100,0.1);
  border: 1px solid rgba(255,100,100,0.3);
  border-radius: 10px;
  padding: 14px 16px;
  color: #ff8888;
  font-size: 0.9rem;
  margin-top: 16px;
  display: none;
}

@media(max-width:480px){
  .platform-btn { min-width: 90px; font-size: 0.8rem; }
  .generate-btn { font-size: 1.1rem; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-line">
      <div class="dot"></div>
      <h1>GLOSS POINT <span>AI</span></h1>
      <div class="dot"></div>
    </div>
    <p>Agent social media — generuje posty na Instagram i Facebook</p>
  </div>

  <!-- PLATFORM -->
  <span class="label">Platforma</span>
  <div class="platform-row">
    <button class="platform-btn active" data-platform="instagram" onclick="selectPlatform(this)">
      📸 Instagram
    </button>
    <button class="platform-btn" data-platform="facebook" onclick="selectPlatform(this)">
      👥 Facebook
    </button>
    <button class="platform-btn" data-platform="both" onclick="selectPlatform(this)">
      ✨ Oba
    </button>
  </div>

  <!-- TONE -->
  <span class="label">Ton komunikacji</span>
  <div class="tone-row">
    <button class="tone-btn active" data-tone="profesjonalny" onclick="selectTone(this)">💼 Profesjonalny</button>
    <button class="tone-btn" data-tone="energetyczny" onclick="selectTone(this)">⚡ Energetyczny</button>
    <button class="tone-btn" data-tone="luzny" onclick="selectTone(this)">😎 Luźny</button>
    <button class="tone-btn" data-tone="ekskluzywny" onclick="selectTone(this)">👑 Ekskluzywny</button>
    <button class="tone-btn" data-tone="edukacyjny" onclick="selectTone(this)">🎓 Edukacyjny</button>
  </div>

  <!-- QUICK TOPICS -->
  <span class="label">Szybkie tematy</span>
  <div class="topics-row">
    <button class="topic-chip" onclick="setTopic('Powłoka ceramiczna — efekty i korzyści')">🛡️ Powłoka ceramiczna</button>
    <button class="topic-chip" onclick="setTopic('Folia PPF — ochrona lakieru')">🎬 Folia PPF</button>
    <button class="topic-chip" onclick="setTopic('Detailing wnętrza — czyszczenie i renowacja')">✨ Detailing wnętrza</button>
    <button class="topic-chip" onclick="setTopic('Przyciemnianie szyb — efekty i cena')">🕶️ Przyciemnianie szyb</button>
    <button class="topic-chip" onclick="setTopic('Korekta lakieru — usuwanie rys i swirli')">🔄 Korekta lakieru</button>
    <button class="topic-chip" onclick="setTopic('Promocja lub oferta specjalna dla nowych klientów')">🎁 Promocja</button>
    <button class="topic-chip" onclick="setTopic('Realizacja — efekty przed i po detailingu')">📷 Realizacja przed/po</button>
    <button class="topic-chip" onclick="setTopic('Dlaczego warto wybrać Gloss Point w Tarnowie')">🏆 Dlaczego my</button>
  </div>

  <!-- INPUT -->
  <span class="label">Opisz temat posta</span>
  <div class="input-wrap">
    <textarea id="topicInput" placeholder="np. Właśnie skończyłem powłokę ceramiczną na BMW X5 — napisz post pokazujący efekty i zachęcający do rezerwacji..."></textarea>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generatePost()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">GENERUJ POST</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <!-- RESULT -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span id="resultLabel">POST GOTOWY</span>
      <div class="result-actions">
        <button class="action-btn" onclick="copyPost()">📋 Kopiuj</button>
        <button class="action-btn" onclick="regenerate()">🔄 Generuj ponownie</button>
      </div>
    </div>
    <div class="result-body">
      <div class="post-preview" id="postText"></div>
      <div class="hashtags-block">
        <div class="hashtags-label">Hashtagi</div>
        <div class="hashtags-text" id="hashtagsText"></div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-section" id="historySection">
    <div class="divider"></div>
    <h3>OSTATNIE POSTY</h3>
    <div id="historyList"></div>
  </div>

</div>

<script>
let selectedPlatform = 'instagram';
let selectedTone = 'profesjonalny';
let lastTopic = '';
let history = [];

function selectPlatform(btn) {
  document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedPlatform = btn.dataset.platform;
}

function selectTone(btn) {
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTone = btn.dataset.tone;
}

function setTopic(text) {
  document.getElementById('topicInput').value = text;
}

async function generatePost() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) {
    showError('Wpisz temat posta!');
    return;
  }

  lastTopic = topic;
  setLoading(true);
  hideError();
  document.getElementById('resultCard').style.display = 'none';

  const platformMap = {
    instagram: 'Instagram',
    facebook: 'Facebook',
    both: 'Instagram i Facebook (dwa osobne posty)'
  };

  const toneMap = {
    profesjonalny: 'profesjonalny i ekspercki',
    energetyczny: 'energetyczny i motywujący',
    luzny: 'luźny i przyjacielski',
    ekskluzywny: 'ekskluzywny i luksusowy',
    edukacyjny: 'edukacyjny i informacyjny'
  };

  const prompt = `Jesteś ekspertem od social mediów dla firmy GLOSS POINT DETAILING z Tarnowa.

Firma zajmuje się profesjonalnym detailingiem samochodowym: powłoki ceramiczne, folia PPF, korekta lakieru, detailing wnętrza, przyciemnianie szyb, mycie detailingowe.

Wygeneruj post na ${platformMap[selectedPlatform]} na temat: "${topic}"

Ton: ${toneMap[selectedTone]}

ZASADY:
- Post po polsku
- Angażujący, przyciągający uwagę
- Zawiera call-to-action (zarezerwuj, zadzwoń: +48 660 706 043, lub odwiedź glosspoint.pl)
- Dla Instagram: krótszy, bardziej wizualny, z emoji
- Dla Facebook: może być dłuższy, więcej szczegółów
- Jeśli "Oba" — napisz dwa osobne posty oznaczone [INSTAGRAM] i [FACEBOOK]
- NIE używaj znaku — (długa pauza). Zamiast tego używaj zwykłego myślnika - lub w ogóle go pomijaj
- NIE pisz hashtagów w treści posta - oddziel je na końcu po "---HASHTAGI---"
- Po "---HASHTAGI---" napisz tylko hashtagi oddzielone spacją, minimum 15, maksimum 25
- Hashtagi muszą być po polsku i angielsku, lokalnie (tarnow) i branżowo

Format odpowiedzi:
[treść posta]
---HASHTAGI---
[hashtagi]`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const fullText = data.content[0].text;

    const parts = fullText.split('---HASHTAGI---');
    const postContent = parts[0].trim();
    const hashtags = parts[1] ? parts[1].trim() : '';

    showResult(postContent, hashtags);
    addToHistory(topic, postContent);

  } catch (err) {
    showError('Błąd połączenia z API. Spróbuj ponownie.');
  }

  setLoading(false);
}

function showResult(post, hashtags) {
  document.getElementById('postText').textContent = post;
  document.getElementById('hashtagsText').textContent = hashtags;
  const card = document.getElementById('resultCard');
  card.style.display = 'block';

  const labels = {
    instagram: '📸 POST NA INSTAGRAM',
    facebook: '👥 POST NA FACEBOOK',
    both: '✨ POSTY NA OBA KANAŁY'
  };
  document.getElementById('resultLabel').textContent = labels[selectedPlatform];

  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function addToHistory(topic, post) {
  history.unshift({ topic, post, platform: selectedPlatform, time: new Date() });
  if (history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) return;
  document.getElementById('historySection').style.display = 'block';
  const icons = { instagram: '📸', facebook: '👥', both: '✨' };
  document.getElementById('historyList').innerHTML = history.map((item, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-platform">${icons[item.platform]}</div>
      <div class="history-content">
        <div class="history-topic">${item.topic}</div>
        <div class="history-preview">${item.post.substring(0, 80)}...</div>
      </div>
      <div class="history-time">${formatTime(item.time)}</div>
    </div>
  `).join('');
}

function loadHistory(i) {
  const item = history[i];
  document.getElementById('postText').textContent = item.post;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
}

function formatTime(date) {
  return date.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
}

function copyPost() {
  const post = document.getElementById('postText').textContent;
  const hashtags = document.getElementById('hashtagsText').textContent;
  const full = post + '\n\n' + hashtags;
  navigator.clipboard.writeText(full).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Skopiowano!';
    setTimeout(() => btn.textContent = '📋 Kopiuj', 2000);
  });
}

function regenerate() {
  document.getElementById('topicInput').value = lastTopic;
  generatePost();
}

function setLoading(val) {
  const btn = document.getElementById('generateBtn');
  const spinner = document.getElementById('spinner');
  const text = document.getElementById('btnText');
  btn.disabled = val;
  spinner.style.display = val ? 'block' : 'none';
  text.textContent = val ? 'GENERUJĘ...' : 'GENERUJ POST';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
</script>
</body>
</html>
